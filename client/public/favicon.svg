<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Event horizon + accretion disk: black core, bright photon ring,
         orange-red glow falling off into space. -->
    <radialGradient id="bh" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="34%" stop-color="#000"/>
      <stop offset="38%" stop-color="#fff2c2"/>
      <stop offset="44%" stop-color="#ffb347"/>
      <stop offset="52%" stop-color="#ff4a00"/>
      <stop offset="68%" stop-color="#7a1a00" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="16" cy="16" r="16" fill="url(#bh)"/>
</svg>
